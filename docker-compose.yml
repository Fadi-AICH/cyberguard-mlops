services:
  api:
    build: .
    container_name: cyberguard-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: cyberguard-mlflow
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////mlflow/mlflow.db",
        "--serve-artifacts",
        "--artifacts-destination",
        "/mlflow/artifacts",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
      ]
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: cyberguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cyberguard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  airflow:
    image: apache/airflow:3.0.6-python3.11
    container_name: cyberguard-airflow
    profiles: ["airflow"]
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__API__BASE_URL=http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./:/opt/airflow/project
    command: ["bash", "-lc", "airflow standalone"]
