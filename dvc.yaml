stages:
  generate_data:
    cmd: .\.venv\Scripts\python.exe -m cyberguard_ml.pipeline.ingest_ciciot2023 --rows 3000 --page-size 100 --offset 0
    deps:
      - src/cyberguard_ml/pipeline/ingest_ciciot2023.py
    outs:
      - data/raw/network_flows.csv
      - data/raw/dataset_metadata.json
      - data/processed/reference_window.csv
      - data/processed/current_window.csv
  validate_data:
    cmd: .\.venv\Scripts\python.exe -m cyberguard_ml.pipeline.validate_data
    deps:
      - data/raw/network_flows.csv
      - src/cyberguard_ml/pipeline/validate_data.py
    outs:
      - data/processed/network_flows_validated.csv
    metrics:
      - reports/data_validation.json
  train_model:
    cmd: .\.venv\Scripts\python.exe -m cyberguard_ml.pipeline.train_model
    deps:
      - data/processed/network_flows_validated.csv
      - src/cyberguard_ml/pipeline/train_model.py
    outs:
      - models/cyberguard_model.joblib
      - models/model_card.json
    metrics:
      - models/metrics.json
  drift_report:
    cmd: .\.venv\Scripts\python.exe -m cyberguard_ml.monitoring.drift_report
    deps:
      - data/processed/reference_window.csv
      - data/processed/current_window.csv
      - src/cyberguard_ml/monitoring/drift_report.py
    outs:
      - reports/drift_report.json:
          cache: false
      - reports/evidently_drift_report.html:
          cache: false
  great_expectations:
    cmd: .\.venv\Scripts\python.exe -m cyberguard_ml.pipeline.great_expectations_check
    deps:
      - data/processed/network_flows_validated.csv
      - src/cyberguard_ml/pipeline/great_expectations_check.py
    outs:
      - reports/great_expectations_suite.json:
          cache: false
      - reports/great_expectations_validation.json:
          cache: false
