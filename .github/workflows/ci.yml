name: ci

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Format and lint checks
        run: |
          black --check src tests
          isort --check-only src tests
          ruff check src tests
          mypy src
      - name: Generate pipeline artifacts
        run: |
          python -m cyberguard_ml.pipeline.ingest_ciciot2023 --rows 1200 --page-size 100 --offset 0
          python -m cyberguard_ml.pipeline.validate_data
          python -m cyberguard_ml.pipeline.train_model
      - name: Test
        run: pytest
      - name: Build Docker image
        run: docker build -t cyberguard-mlops:${{ github.sha }} .
